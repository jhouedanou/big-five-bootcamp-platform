name: laveiye_app
description: LAVEIYE - wrapper natif WebView du site laveiye.com.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # WebView officielle
  webview_flutter: ^4.10.0
  # Controllers bas niveau Android (cache, file upload, geoloc)
  webview_flutter_android: ^4.3.0
  # Controllers bas niveau iOS (WKWebView)
  webview_flutter_wkwebview: ^3.16.0

  # Ouverture des liens externes (mailto, tel, wa.me, social...)
  url_launcher: ^6.3.0

  # Detection connexion reseau (ecran "pas de connexion")
  connectivity_plus: ^6.0.5

  # Permissions runtime (camera, geoloc, stockage)
  permission_handler: ^11.3.1

  # Telechargement visuels -> galerie photos
  gal: ^2.3.0
  # Recuperation des octets du fichier a telecharger
  http: ^1.2.0
  # Dossier temporaire (videos avant ajout galerie)
  path_provider: ^2.1.4

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

  # Generation icones app
  flutter_launcher_icons: ^0.13.1
  # Generation splash natif
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/

# ---------------------------------------------------------------------------
# Icones adaptatives Android + icone iOS.
# Genere avec : dart run flutter_launcher_icons
# Place le logo carre (1024x1024 PNG) dans assets/images/logo.png
# ---------------------------------------------------------------------------
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/logo.png"
  min_sdk_android: 23
  adaptive_icon_background: "#F2B33D"
  adaptive_icon_foreground: "assets/images/logo_foreground.png"
  remove_alpha_ios: true
  background_color_ios: "#F2B33D"
# NB : config splash dans flutter_native_splash.yaml (fichier dedie).
